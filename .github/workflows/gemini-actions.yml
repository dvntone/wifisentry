name: '🤖 Gemini Actions'

on:
  workflow_call:
    inputs:
      task:
        type: 'string'
        description: 'The task to perform (review, triage, invoke)'
        required: true
      additional_context:
        type: 'string'
        description: 'Any additional context from the request'
        required: false

jobs:
  review:
    if: inputs.task == 'review'
    runs-on: 'ubuntu-latest'
    timeout-minutes: 10
    permissions:
      contents: 'read'
      id-token: 'write'
      issues: 'write'
      pull-requests: 'write'
    steps:
      - name: 'Mint identity token'
        id: 'mint_identity_token'
        if: |-
          ${{ vars.APP_ID }}
        uses: 'actions/create-github-app-token@v2'
        with:
          app-id: '${{ vars.APP_ID }}'
          private-key: '${{ secrets.APP_PRIVATE_KEY }}'
          permission-contents: 'read'
          permission-issues: 'write'
          permission-pull-requests: 'write'

      - name: 'Checkout repository'
        uses: 'actions/checkout@v4'

      - name: 'Run Gemini pull request review'
        uses: 'google-github-actions/run-gemini-cli@v0'
        id: 'gemini_pr_review'
        if: |-
          ${{ vars.GOOGLE_CLOUD_PROJECT != '' && secrets.GEMINI_API_KEY != '' }}
        env:
          GITHUB_TOKEN: '${{ steps.mint_identity_token.outputs.token || secrets.GITHUB_TOKEN || github.token }}'
          ISSUE_TITLE: '${{ github.event.pull_request.title || github.event.issue.title }}'
          ISSUE_BODY: '${{ github.event.pull_request.body || github.event.issue.body }}'
          PULL_REQUEST_NUMBER: '${{ github.event.pull_request.number || github.event.issue.number }}'
          REPOSITORY: '${{ github.repository }}'
          ADDITIONAL_CONTEXT: '${{ inputs.additional_context }}'
        with:
          gcp_location: '${{ vars.GOOGLE_CLOUD_LOCATION || '' }}'
          gcp_project_id: '${{ vars.GOOGLE_CLOUD_PROJECT || '' }}'
          gcp_service_account: '${{ vars.SERVICE_ACCOUNT_EMAIL || '' }}'
          gcp_workload_identity_provider: '${{ vars.GCP_WIF_PROVIDER || '' }}'
          gemini_api_key: '${{ secrets.GEMINI_API_KEY || '' }}'
          gemini_cli_version: '${{ vars.GEMINI_CLI_VERSION || '' }}'
          gemini_debug: 'false'
          gemini_model: '${{ vars.GEMINI_MODEL || '' }}'
          google_api_key: '${{ secrets.GOOGLE_API_KEY || '' }}'
          use_gemini_code_assist: '${{ vars.GOOGLE_GENAI_USE_GCA || false }}'
          use_vertex_ai: '${{ vars.GOOGLE_GENAI_USE_VERTEXAI || false }}'
          upload_artifacts: '${{ vars.UPLOAD_ARTIFACTS || false }}'
          workflow_name: 'gemini-review'
          prompt: '/gemini-review'

  triage:
    if: inputs.task == 'triage'
    runs-on: 'ubuntu-latest'
    timeout-minutes: 7
    outputs:
      selected_labels: '${{ env.SELECTED_LABELS }}'
    permissions:
      contents: 'read'
      id-token: 'write'
      issues: 'write'
      pull-requests: 'write'
    steps:
      - name: 'Get repository labels'
        id: 'get_labels'
        uses: 'actions/github-script@v7'
        with:
          script: |-
            const labels = await github.paginate(github.rest.issues.listLabelsForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const labelNames = labels.map(l => l.name);
            core.setOutput('available_labels', labelNames.join(','));

      - name: 'Run Gemini issue analysis'
        uses: 'google-github-actions/run-gemini-cli@v0'
        if: |-
          ${{ secrets.GEMINI_API_KEY != '' }}
        with:
          gemini_api_key: '${{ secrets.GEMINI_API_KEY || '' }}'
          workflow_name: 'gemini-triage'
          prompt: '/gemini-triage'
        env:
          ISSUE_TITLE: '${{ github.event.issue.title }}'
          ISSUE_BODY: '${{ github.event.issue.body }}'
          AVAILABLE_LABELS: '${{ steps.get_labels.outputs.available_labels }}'

  invoke:
    if: inputs.task == 'invoke'
    runs-on: 'ubuntu-latest'
    permissions:
      contents: 'read'
      id-token: 'write'
      issues: 'write'
      pull-requests: 'write'
    steps:
      - name: 'Mint identity token'
        id: 'mint_identity_token'
        if: |-
          ${{ vars.APP_ID }}
        uses: 'actions/create-github-app-token@v2'
        with:
          app-id: '${{ vars.APP_ID }}'
          private-key: '${{ secrets.APP_PRIVATE_KEY }}'

      - name: 'Run Gemini CLI'
        uses: 'google-github-actions/run-gemini-cli@v0'
        if: |-
          ${{ secrets.GEMINI_API_KEY != '' }}
        env:
          GITHUB_TOKEN: '${{ steps.mint_identity_token.outputs.token || secrets.GITHUB_TOKEN || github.token }}'
          ADDITIONAL_CONTEXT: '${{ inputs.additional_context }}'
        with:
          gemini_api_key: '${{ secrets.GEMINI_API_KEY || '' }}'
          workflow_name: 'gemini-invoke'
          prompt: '/gemini-invoke'
