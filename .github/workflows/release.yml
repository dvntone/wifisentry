name: Release - Build & Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'package.json'
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v1.2.8)'
        required: false

permissions:
  contents: write
  pull-requests: read
  actions: write

jobs:
  detect-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      previous-version: ${{ steps.version.outputs.previous-version }}
      version-changed: ${{ steps.version.outputs.changed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect version changes
        id: version
        run: |
          # If triggered by tag, use it
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "changed=true" >> $GITHUB_OUTPUT
          # If version passed via dispatch, use it
          elif [ -n "${{ inputs.version }}" ]; then
            VERSION=${{ inputs.version }}
            VERSION=${VERSION#v} # Ensure no v prefix
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "changed=true" >> $GITHUB_OUTPUT
          # Otherwise detect from package.json
          else
            CURRENT_VERSION=$(jq -r '.version' package.json)
            PREVIOUS_VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.0.0")
            PREVIOUS_VERSION=${PREVIOUS_VERSION#v}
            
            echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
            echo "previous-version=$PREVIOUS_VERSION" >> $GITHUB_OUTPUT
            
            if [ "$CURRENT_VERSION" != "$PREVIOUS_VERSION" ]; then
              echo "changed=true" >> $GITHUB_OUTPUT
            else
              echo "changed=false" >> $GITHUB_OUTPUT
            fi
          fi

  generate-changelog:
    needs: detect-version
    if: needs.detect-version.outputs.version-changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        run: |
          VERSION=${{ needs.detect-version.outputs.version }}
          PREV_VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          
          if [ -n "$PREV_VERSION" ]; then
            COMMIT_RANGE="$PREV_VERSION..HEAD"
          else
            COMMIT_RANGE="--max-count=50"
          fi
          
          {
            echo "## WiFi Sentry v$VERSION"
            echo ""
            
            FEATURES=$(git log $COMMIT_RANGE --grep="^feat" --pretty=format:"- %s" --no-merges | sed 's/feat[^:]*: //' || true)
            if [ -n "$FEATURES" ]; then
              echo "### ✨ New Features"
              echo "$FEATURES"
              echo ""
            fi
            
            FIXES=$(git log $COMMIT_RANGE --grep="^fix" --pretty=format:"- %s" --no-merges | sed 's/fix[^:]*: //' || true)
            if [ -n "$FIXES" ]; then
              echo "### 🐛 Bug Fixes"
              echo "$FIXES"
              echo ""
            fi

            if [ -z "$FEATURES" ] && [ -z "$FIXES" ]; then
              echo "### 🛠️ Changes"
              git log $COMMIT_RANGE --pretty=format:"- %s" --no-merges | head -n 15
              echo ""
            fi
            
            echo "---"
            echo "**Download:** See the assets below for your platform."
          } > release_notes.md

      - name: Upload changelog
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release_notes.md

  build-windows:
    needs: detect-version
    if: needs.detect-version.outputs.version-changed == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - name: Build Desktop
        run: |
          npm install
          cd web-app
          npm install
          npm run build
          cd ..
          npm run desktop:build

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/*.exe

  build-android:
    needs: detect-version
    if: needs.detect-version.outputs.version-changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate Debug Keystore
        run: |
          mkdir -p ~/.android
          if [ ! -f ~/.android/debug.keystore ]; then
            keytool -genkey -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Build Android Release
        working-directory: android-native
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleDevRelease
      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: android-native/app/build/outputs/apk/dev/release/*.apk

  build-pwa:
    needs: detect-version
    if: needs.detect-version.outputs.version-changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - name: Build Web Application
        run: |
          npm install
          cd web-app
          npm install
          npm run build
          tar -czf ../wifi-sentry-web-${{ needs.detect-version.outputs.version }}.tar.gz out/
          zip -r ../wifi-sentry-web-${{ needs.detect-version.outputs.version }}.zip out/
      - name: Upload PWA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pwa-build
          path: wifi-sentry-web-*

  create-github-release:
    needs: [detect-version, generate-changelog, build-windows, build-android, build-pwa]
    runs-on: ubuntu-latest
    steps:
      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes

      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: assets/

      - name: Download Android build
        uses: actions/download-artifact@v4
        with:
          name: android-release-apk
          path: assets/

      - name: Download PWA build
        uses: actions/download-artifact@v4
        with:
          name: pwa-build
          path: assets/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.detect-version.outputs.version }}
          name: WiFi Sentry v${{ needs.detect-version.outputs.version }}
          body_path: release_notes.md
          files: assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
