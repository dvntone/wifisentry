name: Emergency Rollback

on:
  workflow_dispatch:
    inputs:
      rollback-version:
        description: 'Version to rollback to (e.g., 1.0.0)'
        required: true
        type: string
      reason:
        description: 'Reason for rollback'
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  validate-version:
    runs-on: ubuntu-latest
    outputs:
      valid: ${{ steps.check.outputs.valid }}
      branch-exists: ${{ steps.check.outputs.branch-exists }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version exists
        id: check
        run: |
          VERSION="${{ github.event.inputs.rollback-version }}"
          TAG="v$VERSION"
          
          echo "🔍 Checking for version $VERSION..."
          
          # Check if tag exists
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "✅ Tag $TAG found"
            echo "valid=true" >> $GITHUB_OUTPUT
          else
            echo "❌ Tag $TAG not found"
            echo "valid=false" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          # Check if backup branch exists
          BRANCH="release/v$VERSION"
          if git rev-parse "origin/$BRANCH" >/dev/null 2>&1; then
            echo "✅ Backup branch $BRANCH found"
            echo "branch-exists=true" >> $GITHUB_OUTPUT
          else
            echo "⚠️  Backup branch $BRANCH not found (will rollback from tag)"
            echo "branch-exists=false" >> $GITHUB_OUTPUT
          fi

  rollback:
    needs: validate-version
    if: needs.validate-version.outputs.valid == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Perform rollback
        id: rollback
        run: |
          VERSION="${{ github.event.inputs.rollback-version }}"
          TAG="v$VERSION"
          REASON="${{ github.event.inputs.reason }}"
          
          echo "⏮️  Rolling back to version $VERSION..."
          echo "Reason: $REASON"
          echo ""
          
          # Get commit hash of the tag
          ROLLBACK_COMMIT=$(git rev-list -n 1 $TAG)
          echo "Rollback commit: $ROLLBACK_COMMIT"
          
          # Reset to tag (soft reset to preserve files)
          git reset --soft $TAG
          
          # Update package.json version
          jq ".version = \"$VERSION\"" package.json > package.json.tmp
          mv package.json.tmp package.json

          PREVIOUS_COMMIT=$(git rev-parse HEAD~1 | cut -c1-7)
          
          # Create rollback commit
          git add package.json
          git commit \
            -m "⏮️ Rollback to v$VERSION" \
            -m "Reason: $REASON" \
            -m "Previous commit: $PREVIOUS_COMMIT" \
            -m "Rollback to: $ROLLBACK_COMMIT"
          
          # Tag the rollback
          git tag -a "v${VERSION}-rollback-$(date +%s)" -m "Rollback to $VERSION - Reason: $REASON"
          
          # Push changes
          git push origin main
          git push origin --tags
          
          echo "✅ Rolled back to v$VERSION"
          echo "commit=$ROLLBACK_COMMIT" >> $GITHUB_OUTPUT

      - name: Create rollback release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.event.inputs.rollback-version }}-hotfix
          name: 🚨 Emergency Rollback to v${{ github.event.inputs.rollback-version }}
          body: |
            ## 🚨 Emergency Rollback
            
            **Rolled back to:** v${{ github.event.inputs.rollback-version }}
            **Reason:** ${{ github.event.inputs.reason }}
            **Rollback Time:** ${{ github.event.repository.updated_at }}
            
            ### Actions Taken
            - ✅ Main branch reset to v${{ github.event.inputs.rollback-version }}
            - ✅ package.json updated
            - ✅ Rollback commit created
            - ✅ Backup branches preserved for recovery
            
            ### Next Steps
            1. Review the changes that were rolled back
            2. Fix the issues that caused the rollback
            3. Test thoroughly before re-releasing
            4. Create a new patch/minor/major version
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notification
        run: |
          echo "🚨 ROLLBACK COMPLETED"
          echo ""
          echo "Version: v${{ github.event.inputs.rollback-version }}"
          echo "Reason: ${{ github.event.inputs.reason }}"
          echo "Status: ✅ Main branch rolled back"
          echo ""
          echo "⚠️  Important:"
          echo "  • All backup branches remain available for recovery"
          echo "  • Review git log to see what was reverted"
          echo "  • Test before deploying again"
          echo ""
          echo "Release: https://github.com/${{ github.repository }}/releases/tag/v${{ github.event.inputs.rollback-version }}-hotfix"
